    <text x="472" y="338" font-size="16" font-weight="700" fill="#3E2C39">calendar_east</text>
    <circle cx="816" cy="332" r="16" fill="#7E9476"/><text x="816" y="337" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">0.7</text>
    <text x="472" y="357" font-size="11.5" font-style="italic" fill="#8A6B7C">Vir: Koledar/Cycle Anchor</text>
