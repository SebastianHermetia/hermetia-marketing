<svg viewBox="0 0 820 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="820" height="640" rx="18" fill="#FBF7F0"/>
  <text x="40" y="44" font-size="23" font-weight="700" fill="#3E2C39">Algoritmus — z 832 signálov na 2 základné témy</text>
  <text x="40" y="68" font-size="14" fill="#6B4A5E">Deterministické zhutňovanie v etapách (triedená iterácia + pevné zaokrúhľovanie → bitovo stabilné).</text>

  <!-- Funnel stages: centered rounded rects, decreasing width -->
  <!-- stage 1 -->
  <rect x="110" y="90" width="600" height="52" rx="9" fill="#6B4A5E"/>
  <text x="410" y="113" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">① Nespracované signály · 32 systémov × až 26 tém.* (≈ 832 hodnôt)</text>
  <text x="410" y="132" font-size="10.5" fill="#E7D9E0" text-anchor="middle">surové z calc_results · agregované bez dôveryhodnosti</text>

  <rect x="150" y="152" width="520" height="48" rx="9" fill="#7A5670"/>
  <text x="410" y="173" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">② Saturácia v rámci rodiny → 8 rodín × 26</text>
  <text x="410" y="190" font-size="10.5" fill="#EAD9E2" text-anchor="middle">max + λ(1−max)·avg_rest (≤ 1, redundancia tlmená)</text>

  <rect x="185" y="210" width="450" height="48" rx="9" fill="#8B6F84"/>
  <text x="410" y="231" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">③ Makroprojekcia · Prechod pre chodcov 26 → 9</text>
  <text x="410" y="248" font-size="10.5" fill="#EFE2EA" text-anchor="middle">8 rodín × 9 makro tém</text>

  <rect x="215" y="268" width="390" height="48" rx="9" fill="#6E8867"/>
  <text x="410" y="289" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">④ Mäkká prítomnosť + medzirodina</text>
  <text x="410" y="306" font-size="10.5" fill="#E2EBDD" text-anchor="middle">raw_strength · konvergencia (menovateľ CAN_EMIT) · dohoda · dôvera</text>

  <rect x="245" y="326" width="330" height="46" rx="9" fill="#7E9476"/>
  <text x="410" y="346" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">⑤ Normalizácia (poschodie R_MIN)</text>
  <text x="410" y="363" font-size="10.5" fill="#E6EEE1" text-anchor="middle">strong_rel (hodnotenie) · strong_abs (priečny profil)</text>

  <rect x="275" y="382" width="270" height="46" rx="9" fill="#B79A45"/>
  <text x="410" y="402" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">⑥ Skóre = s (β+(1−β) konv.)</text>
  <text x="410" y="419" font-size="10.5" fill="#F5ECD3" text-anchor="middle">Rebríček 9 makro tém</text>

  <rect x="300" y="438" width="220" height="46" rx="9" fill="#C2A14D"/>
  <text x="410" y="458" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">⑦ Napínacie polia</text>
  <text x="410" y="475" font-size="10.5" fill="#F7EFD6" text-anchor="middle">√(a b) cez OPOPITY</text>

  <rect x="320" y="494" width="180" height="54" rx="10" fill="#3E2C39"/>
  <text x="410" y="516" font-size="14" font-weight="700" fill="#F4D98A" text-anchor="middle">★ core_themes (najlepšie 2)</text>
  <text x="410" y="535" font-size="10.5" fill="#D9C9D2" text-anchor="middle">+ napätia + proveniencia</text>

  <!-- side note micro -->
  <rect x="600" y="326" width="180" height="100" rx="10" fill="#FFFFFF" stroke="#E4D9CB"/>
  <text x="690" y="350" font-size="11.5" font-weight="700" fill="#6B4A5E" text-anchor="middle">Mikro pohľad (26)</text>
  <text x="690" y="370" font-size="10" fill="#7A6470" text-anchor="middle">Dodatočné kroky ④–⑥</text>
  <text x="690" y="385" font-size="10" fill="#7A6470" text-anchor="middle">v izbe 26</text>
  <text x="690" y="406" font-size="10" fill="#9A8AA0" text-anchor="middle">→ kŕmi ich</text>
  <text x="690" y="420" font-size="10" fill="#9A8AA0" text-anchor="middle">10 podúrovní</text>

  <text x="40" y="588" font-size="11.5" fill="#6B4A5E">Štyri samostatné výstupné veľkosti na tému: <tspan font-weight="700" fill="#3E2C39">strength</tspan> (aký silný) · <tspan font-weight="700" fill="#6E8867">konvergencie</tspan> (aká široká) · <tspan font-weight="700" fill="#8B6F84">agreement</tspan> (ako tesne) · <tspan font-weight="700" fill="#B0892F">confidence</tspan> (ako určite).</text>
  <text x="40" y="610" font-size="11.5" fill="#6B4A5E">Nič sa nezlúči do jedinej hodnoty, ktorá vymaže informácie.</text>
</svg>
