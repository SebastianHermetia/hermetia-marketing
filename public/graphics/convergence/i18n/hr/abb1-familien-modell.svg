  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Osnovno pravilo: računa se 5 sustava iz iste obitelji koji odražavaju istu temu <tspan font-weight="700">ne</tspan> poput 5 neovisnih dokaza —</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">prava konvergencija se događa samo kada <tspan font-weight="700" fill="#3E2C39">nekoliko različitih obitelji</tspan> ukazuju na istu temu.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Convergence Engine · Slika 1 — Dodjela obitelji je verzionirana konfiguracija (treba lektorirati)</text>
</svg>
