  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Kernregel: 5 systemen uit dezelfde familie die hetzelfde thema weerspiegelen, tellen mee <tspan font-weight="700">niet</tspan> zoals vijf onafhankelijke bewijsstukken —</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">echte convergentie vindt alleen plaats wanneer <tspan font-weight="700" fill="#3E2C39">meerdere verschillende families</tspan> verwijzen naar hetzelfde onderwerp.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Convergence Engine · Fig. 1 — Familietoewijzing is versieconfiguratie (moet worden proefgelezen)</text>
