    <rect x="450" y="208" width="8" height="92" rx="4" fill="#8A6B7C"/>
    <text x="472" y="234" font-size="16" font-weight="700" fill="#3E2C39">numerologija</text>
    <circle cx="816" cy="228" r="16" fill="#8A6B7C"/><text x="816" y="233" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">0.8</text>
    <text x="472" y="253" font-size="11.5" font-style="italic" fill="#8A6B7C">Vir: Skupni datum rojstva / ime</text>
    <text x="472" y="277" font-size="10.5" fill="#5E4257">numerologija · kabala · kabala_ext · tarot_rojstvo · karte_usode · lo_shu_grid</text>
  </g>

