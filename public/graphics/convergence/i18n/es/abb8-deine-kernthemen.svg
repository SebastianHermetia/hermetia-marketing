<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="560" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Que te lleva por dentro</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Dos temas atraviesan casi todas las perspectivas sobre usted: su hilo conductor.</text>

  <!-- Core card 1 -->
  <rect x="40" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="64" y="140" font-size="13" font-weight="700" fill="#B0892F">★ TEMA PRINCIPAL</text>
  <text x="64" y="172" font-size="22" font-weight="700" fill="#3E2C39">Permitir conexión</text>
  <text x="64" y="202" font-size="13.5" fill="#5E4257">La cercanía, la compasión y la unión real son</text>
  <text x="64" y="221" font-size="13.5" fill="#5E4257">el suelo en el que creces.</text>
  <text x="64" y="256" font-size="12" fill="#8A6B7C">apoyado por 5 de 8 perspectivas de vida</text>
  <g>
    <circle cx="70" cy="276" r="7" fill="#C2A14D"/><circle cx="92" cy="276" r="7" fill="#C2A14D"/><circle cx="114" cy="276" r="7" fill="#C2A14D"/><circle cx="136" cy="276" r="7" fill="#C2A14D"/><circle cx="158" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="180" cy="276" r="7" fill="#E7DCC8"/><circle cx="202" cy="276" r="7" fill="#E7DCC8"/><circle cx="224" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- Core card 2 -->
  <rect x="460" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="484" y="140" font-size="13" font-weight="700" fill="#B0892F">★ TEMA PRINCIPAL</text>
  <text x="484" y="172" font-size="22" font-weight="700" fill="#3E2C39">Permitir silencio y profundidad</text>
  <text x="484" y="202" font-size="13.5" fill="#5E4257">Necesitas retiro y profundidad para poder</text>
  <text x="484" y="221" font-size="13.5" fill="#5E4257">Encontrarte es fuerza, no falta.</text>
  <text x="484" y="256" font-size="12" fill="#8A6B7C">apoyado en 4 de 8 perspectivas de vida</text>
  <g>
    <circle cx="490" cy="276" r="7" fill="#C2A14D"/><circle cx="512" cy="276" r="7" fill="#C2A14D"/><circle cx="534" cy="276" r="7" fill="#C2A14D"/><circle cx="556" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="578" cy="276" r="7" fill="#E7DCC8"/><circle cx="600" cy="276" r="7" fill="#E7DCC8"/><circle cx="622" cy="276" r="7" fill="#E7DCC8"/><circle cx="644" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- supporting themes -->
  <text x="40" y="344" font-size="14" font-weight="700" fill="#6B4A5E">También resuena contigo</text>
  <text x="40" y="366" font-size="12" fill="#9A8AA0">- más situacional, más silencioso que tu núcleo:</text>
  <g font-size="13" fill="#5E4257">
    <rect x="40" y="384" width="200" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="60" y="409">Coraje para ser visible</text>
    <rect x="256" y="384" width="190" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="276" y="409">Deja ir el control</text>
    <rect x="462" y="384" width="220" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="482" y="409">Mantente en tu propio ritmo</text>
    <rect x="40" y="434" width="150" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="60" y="459" fill="#9A8AA0">La alegría...</text>
    <rect x="206" y="434" width="175" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="226" y="459" fill="#9A8AA0">Confía en el tiempo</text>
    <rect x="397" y="434" width="140" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="417" y="459" fill="#9A8AA0">Establecer límites</text>
  </g>

  <text x="40" y="512" font-size="12.5" fill="#6B4A5E">Cuantas más perspectivas independientes haya sobre un tema, más fiablemente te describirá.</text>
  <text x="40" y="531" font-size="12.5" fill="#6B4A5E">Sus temas centrales no son el resultado de un solo método.</text>
  <text x="40" y="552" font-size="10.5" fill="#A38FA0" font-style="italic">Perfil de ejemplo, esquema · Astrakey</text>
</svg>
