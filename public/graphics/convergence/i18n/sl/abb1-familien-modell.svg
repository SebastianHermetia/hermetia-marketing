    <text x="472" y="442" font-size="16" font-weight="700" fill="#3E2C39">cikel</text>
    <circle cx="816" cy="436" r="16" fill="#9DB094"/><text x="816" y="441" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">0.5</text>
    <text x="472" y="461" font-size="11.5" font-style="italic" fill="#8A6B7C">Vir: cikel čistih datumov</text>
    <text x="472" y="485" font-size="10.5" fill="#5E4257">bioritem</text>
