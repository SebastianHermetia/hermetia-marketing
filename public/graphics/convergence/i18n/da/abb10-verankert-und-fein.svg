<svg viewBox="0 0 860 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="860" height="650" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Hvad er solidt forankret - og sikke en fin touch</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Jo længere inde et emne er, jo mere selvstændige perspektiver bekræfter det.</text>

  <!-- rings -->
  <circle cx="290" cy="362" r="242" fill="#EFE6EC" stroke="#DCC9D5"/>
  <circle cx="290" cy="362" r="162" fill="#EAF0E6" stroke="#CFDDC6"/>
  <circle cx="290" cy="362" r="82" fill="#F6EBCF" stroke="#E6D29C"/>

  <!-- inner: verankert -->
  <text x="290" y="356" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Forbundethed</text>
  <text x="290" y="382" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Stilhed &amp; dybde</text>

  <!-- middle: tragend -->
  <text x="290" y="248" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Mod til at være synlig</text>
  <text x="196" y="430" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Slip kontrollen</text>
  <text x="392" y="430" font-size="13" font-weight="600" fill="#5C7A55" text-anchor="middle">egen rytme</text>

  <!-- outer: feine note -->
  <text x="168" y="214" font-size="13" fill="#8B6F84" text-anchor="middle">Glæden</text>
  <text x="420" y="220" font-size="13" fill="#8B6F84" text-anchor="middle">Selvudfoldelse</text>
  <text x="120" y="372" font-size="13" fill="#8B6F84" text-anchor="middle">Timing</text>
  <text x="290" y="572" font-size="13" fill="#8B6F84" text-anchor="middle">Sæt grænser</text>

  <!-- legend -->
  <text x="560" y="150" font-size="16" font-weight="700" fill="#3E2C39">Hvor dybt forankret?</text>
  <circle cx="572" cy="190" r="9" fill="#C2A14D"/>
  <text x="592" y="187" font-size="14" font-weight="700" fill="#3E2C39">Forankret</text>
  <text x="592" y="207" font-size="12" fill="#5E4257">Mange selvstændige synspunkter</text>
  <text x="592" y="224" font-size="12" fill="#5E4257">bekræft det - beskriver dig pålideligt.</text>

  <circle cx="572" cy="262" r="9" fill="#97AD8E"/>
  <text x="592" y="259" font-size="14" font-weight="700" fill="#3E2C39">Bære</text>
  <text x="592" y="279" font-size="12" fill="#5E4257">Flere perspektiver understøtter det.</text>

  <circle cx="572" cy="316" r="9" fill="#C2AEBC"/>
  <text x="592" y="313" font-size="14" font-weight="700" fill="#3E2C39">Fin touch</text>
  <text x="592" y="333" font-size="12" fill="#5E4257">En enkelt stemme - snarere</text>
  <text x="592" y="350" font-size="12" fill="#5E4257">Nuanceret eller situationsbestemt.</text>

  <rect x="560" y="392" width="262" height="150" rx="12" fill="#FFFFFF" stroke="#E4D9CB"/>
  <text x="578" y="420" font-size="13" font-weight="700" fill="#6B4A5E">Hvorfor dette hjælper</text>
  <text x="578" y="444" font-size="12.5" fill="#5E4257">Du behøver ikke give alle resultater det samme</text>
  <text x="578" y="462" font-size="12.5" fill="#5E4257">give meget vægt. Hvad i centrum</text>
  <text x="578" y="480" font-size="12.5" fill="#5E4257">ligger, bærer dig; de fine sedler på</text>
  <text x="578" y="498" font-size="12.5" fill="#5E4257">Kanter er farvestænk, ikke søjler.</text>
  <text x="578" y="524" font-size="11.5" font-style="italic" fill="#8A6B7C">Det er præcis, hvad familien</text>
  <text x="578" y="540" font-size="11.5" font-style="italic" fill="#8A6B7C">Konvergens i baggrunden.</text>

  <text x="40" y="624" font-size="10.5" fill="#A38FA0" font-style="italic">Eksempelprofil, skematisk · “Forankring” = antal selvstændige familier, der støtter emnet · Astrakey</text>
</svg>
