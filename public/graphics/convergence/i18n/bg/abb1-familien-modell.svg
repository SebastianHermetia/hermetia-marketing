    <rect x="40" y="312" width="8" height="92" rx="4" fill="#8B6F84"/>
    <text x="62" y="338" font-size="16" font-weight="700" fill="#3E2C39">astro_sidereal</text>
    <circle cx="406" cy="332" r="16" fill="#8B6F84"/><text x="406" y="337" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">0.8</text>
    <text x="62" y="357" font-size="11.5" font-style="italic" fill="#8A6B7C">Източник: звездни ефемериди (Lahiri)</text>
    <text x="62" y="381" font-size="10.5" fill="#5E4257">ведически · jyotish_пълен</text>
  </g>
  <g>
    <rect x="450" y="312" width="390" height="92" rx="12" fill="#FFFFFF" stroke="#E4D9CB" stroke-width="1.5"/>
