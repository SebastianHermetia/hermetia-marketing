  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Croí-riail: 5 chóras ón teaghlach céanna a léiríonn an comhaireamh téama céanna <tspan font-weight="700">nach bhfuil</tspan> cosúil le 5 phíosa neamhspleácha fianaise —</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">Ní tharlaíonn fíorchóineasú ach amháin nuair a <tspan font-weight="700" fill="#3E2C39">roinnt teaghlaigh éagsúla</tspan> pointe ar an ábhar céanna.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Inneall Coinbhéirseachta · Fíor 1 - Is cumraíocht leagan leagan é tasc teaghlaigh (le léamh profaí)</text>
