<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="900" height="480" rx="18" fill="#FBF7F0"/>
  <text x="40" y="44" font-size="23" font-weight="700" fill="#3E2C39">Postavljanje u cjevovod</text>
  <text x="40" y="68" font-size="14" fill="#6B4A5E">Modul 3 “Sinteza” — statički sloj zgušnjavanja bez LLM-a između sustava i svih potrošača.</text>

  <!-- Input -->
  <rect x="40" y="100" width="210" height="300" rx="12" fill="#FFFFFF" stroke="#E4D9CB"/>
  <text x="145" y="128" font-size="14" font-weight="700" fill="#6B4A5E" text-anchor="middle">Motor (Modul 2)</text>
  <text x="145" y="150" font-size="13" font-weight="700" fill="#3E2C39" text-anchor="middle">32 × Duhovni sustav</text>
  <line x1="64" y1="162" x2="226" y2="162" stroke="#EEE6DA"/>
  <text x="64" y="186" font-size="11.5" fill="#5E4257">• compute() → RawChart</text>
  <text x="64" y="208" font-size="11.5" fill="#5E4257">• theme_signals()</text>
  <text x="78" y="226" font-size="10.5" fill="#9A8AA0">{theme.* : 0..1}</text>
  <text x="64" y="250" font-size="11.5" fill="#5E4257">• RawChart.povjerenje</text>
  <text x="64" y="300" font-size="10.5" fill="#9A8AA0">8 obitelji</text>
  <text x="64" y="318" font-size="10.5" fill="#9A8AA0">(astro · hd_gk · numerologija ·</text>
  <text x="64" y="334" font-size="10.5" fill="#9A8AA0">kalendar · self_report …)</text>

  <!-- Engine -->
  <rect x="310" y="100" width="245" height="300" rx="14" fill="#FBF3E0" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="432" y="130" font-size="16" font-weight="700" fill="#B0892F" text-anchor="middle">KONVERGENTNI MOTOR</text>
  <text x="432" y="150" font-size="11" fill="#9A8AA0" text-anchor="middle">deterministički · nema LLM</text>
  <line x1="332" y1="162" x2="533" y2="162" stroke="#EAD9AE"/>
  <text x="432" y="184" font-size="12.5" font-weight="700" fill="#3E2C39" text-anchor="middle">Profil konvergencije</text>
  <text x="332" y="210" font-size="11.5" fill="#5E4257">★ core_themes (najbolje 2)</text>
  <text x="332" y="232" font-size="11.5" fill="#5E4257">⚖ napetosti</text>
  <text x="332" y="254" font-size="11.5" fill="#5E4257">◷ makro (9) / mikro (26)</text>
  <text x="332" y="276" font-size="11.5" fill="#5E4257">snaga_rel / snaga_aps</text>
  <text x="332" y="298" font-size="11.5" fill="#5E4257">konvergencija · sporazum</text>
  <text x="332" y="320" font-size="11.5" fill="#5E4257">povjerenje · podrijetlo</text>
  <text x="432" y="356" font-size="10.5" fill="#9A8AA0" text-anchor="middle">statički — samo s profile_version /</text>
  <text x="432" y="372" font-size="10.5" fill="#9A8AA0" text-anchor="middle">verzija motora nova</text>

  <!-- Consumers -->
  <g font-size="12" font-weight="600" fill="#3E2C39">
    <rect x="615" y="100" width="245" height="48" rx="10" fill="#FFFFFF" stroke="#E4D9CB"/>
    <text x="632" y="122">Trenutno otkrivanje</text><text x="632" y="139" font-size="10" font-weight="400" fill="#9A8AA0">2 ključne teme nakon uključivanja</text>
    <rect x="615" y="158" width="245" height="48" rx="10" fill="#FFFFFF" stroke="#E4D9CB"/>
    <text x="632" y="180">Karta duše</text><text x="632" y="197" font-size="10" font-weight="400" fill="#9A8AA0">temeljne_teme + napetosti kao vizualno</text>
    <rect x="615" y="216" width="245" height="48" rx="10" fill="#FFFFFF" stroke="#E4D9CB"/>
    <text x="632" y="238">Razina 2 sinteze</text><text x="632" y="255" font-size="10" font-weight="400" fill="#9A8AA0">Uzemljenje umjesto preklapanja.analizirati</text>
    <rect x="615" y="274" width="245" height="48" rx="10" fill="#FFFFFF" stroke="#E4D9CB"/>
    <text x="632" y="296">Navigator (Modul 4)</text><text x="632" y="313" font-size="10" font-weight="400" fill="#9A8AA0">+ Vrijeme / Najnovije / Prilagodljivo</text>
    <rect x="615" y="332" width="245" height="48" rx="10" fill="#FFFFFF" stroke="#E4D9CB"/>
    <text x="632" y="354">Admin</text><text x="632" y="371" font-size="10" font-weight="400" fill="#9A8AA0">Objašnjivost/pokrivenost</text>
  </g>

  <!-- arrows -->
  <text x="280" y="255" font-size="26" fill="#C2A14D" text-anchor="middle">→</text>
  <text x="585" y="255" font-size="26" fill="#C2A14D" text-anchor="middle">→</text>

  <text x="40" y="438" font-size="11.5" fill="#6B4A5E">Vremenski/prilagodljivi termini (vremenski raspored, nedavnost, adaptivni) su namjerno u <tspan font-weight="700" fill="#3E2C39">Navigator</tspan>, ne u motoru — čisto odvajanje slojeva statički ↔ dinamički.</text>
</svg>
