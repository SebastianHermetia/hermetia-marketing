    <rect x="40" y="92" width="8" height="104" rx="4" fill="#C2A14D"/>
    <text x="62" y="118" font-size="16" font-weight="700" fill="#3E2C39">samoprijava ★</text>
    <circle cx="406" cy="112" r="16" fill="#C2A14D"/><text x="406" y="117" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1.3</text>
    <text x="62" y="137" font-size="11.5" font-style="italic" fill="#8A6B7C">Vir: vprašalnik — najbolj neodvisni dokazi</text>
