  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Règle de base : 5 systèmes de la même famille qui reflètent le même nombre de thèmes <tspan font-weight="700">pas</tspan> comme 5 éléments de preuve indépendants —</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">la véritable convergence ne se produit que lorsque <tspan font-weight="700" fill="#3E2C39">plusieurs familles différentes</tspan> pointer vers le même sujet.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Convergence Engine · Fig. 1 — L'affectation des familles est une configuration versionnée (à relire)</text>
