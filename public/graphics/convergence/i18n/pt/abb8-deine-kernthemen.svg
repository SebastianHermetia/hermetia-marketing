<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="560" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">O que leva você para dentro</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Dois temas permeiam quase todas as perspectivas sobre você – seu fio condutor.</text>

  <!-- Core card 1 -->
  <rect x="40" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="64" y="140" font-size="13" font-weight="700" fill="#B0892F">★ TÓPICO PRINCIPAL</text>
  <text x="64" y="172" font-size="22" font-weight="700" fill="#3E2C39">Permitir conexão</text>
  <text x="64" y="202" font-size="13.5" fill="#5E4257">Proximidade, compaixão e união real são</text>
  <text x="64" y="221" font-size="13.5" fill="#5E4257">o solo em que você cresce.</text>
  <text x="64" y="256" font-size="12" fill="#8A6B7C">apoiado por 5 de 8 perspectivas de vida</text>
  <g>
    <circle cx="70" cy="276" r="7" fill="#C2A14D"/><circle cx="92" cy="276" r="7" fill="#C2A14D"/><circle cx="114" cy="276" r="7" fill="#C2A14D"/><circle cx="136" cy="276" r="7" fill="#C2A14D"/><circle cx="158" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="180" cy="276" r="7" fill="#E7DCC8"/><circle cx="202" cy="276" r="7" fill="#E7DCC8"/><circle cx="224" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- Core card 2 -->
  <rect x="460" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="484" y="140" font-size="13" font-weight="700" fill="#B0892F">★ TÓPICO PRINCIPAL</text>
  <text x="484" y="172" font-size="22" font-weight="700" fill="#3E2C39">Permitir silêncio e profundidade</text>
  <text x="484" y="202" font-size="13.5" fill="#5E4257">Você precisa de recuo e profundidade para</text>
  <text x="484" y="221" font-size="13.5" fill="#5E4257">Encontrar você - isso é força, não falta.</text>
  <text x="484" y="256" font-size="12" fill="#8A6B7C">apoiado por 4 de 8 perspectivas de vida</text>
  <g>
    <circle cx="490" cy="276" r="7" fill="#C2A14D"/><circle cx="512" cy="276" r="7" fill="#C2A14D"/><circle cx="534" cy="276" r="7" fill="#C2A14D"/><circle cx="556" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="578" cy="276" r="7" fill="#E7DCC8"/><circle cx="600" cy="276" r="7" fill="#E7DCC8"/><circle cx="622" cy="276" r="7" fill="#E7DCC8"/><circle cx="644" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- supporting themes -->
  <text x="40" y="344" font-size="14" font-weight="700" fill="#6B4A5E">Também ressoa com você</text>
  <text x="40" y="366" font-size="12" fill="#9A8AA0">- mais situacional, mais silencioso que o seu núcleo:</text>
  <g font-size="13" fill="#5E4257">
    <rect x="40" y="384" width="200" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="60" y="409">Coragem para ser visível</text>
    <rect x="256" y="384" width="190" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="276" y="409">Deixe de lado o controle</text>
    <rect x="462" y="384" width="220" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="482" y="409">Fique no seu próprio ritmo</text>
    <rect x="40" y="434" width="150" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="60" y="459" fill="#9A8AA0">A alegria...</text>
    <rect x="206" y="434" width="175" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="226" y="459" fill="#9A8AA0">Confie no tempo</text>
    <rect x="397" y="434" width="140" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="417" y="459" fill="#9A8AA0">Definir limites</text>
  </g>

  <text x="40" y="512" font-size="12.5" fill="#6B4A5E">Quanto mais perspectivas independentes sobre um tópico, mais confiável ele descreve você -</text>
  <text x="40" y="531" font-size="12.5" fill="#6B4A5E">seus temas centrais não são um acidente de um único método.</text>
  <text x="40" y="552" font-size="10.5" fill="#A38FA0" font-style="italic">Exemplo de perfil, esquemático · Astrakey</text>
</svg>
