<svg viewBox="0 0 860 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="860" height="650" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Mis on kindlalt ankurdatud – ja milline peen puudutus</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Mida rohkem seespool teema on, seda sõltumatumad vaatenurgad seda kinnitavad.</text>

  <!-- rings -->
  <circle cx="290" cy="362" r="242" fill="#EFE6EC" stroke="#DCC9D5"/>
  <circle cx="290" cy="362" r="162" fill="#EAF0E6" stroke="#CFDDC6"/>
  <circle cx="290" cy="362" r="82" fill="#F6EBCF" stroke="#E6D29C"/>

  <!-- inner: verankert -->
  <text x="290" y="356" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Ühendus</text>
  <text x="290" y="382" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Vaikus ja sügavus</text>

  <!-- middle: tragend -->
  <text x="290" y="248" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Julgus olla nähtav</text>
  <text x="196" y="430" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Laske kontrolli alt lahti</text>
  <text x="392" y="430" font-size="13" font-weight="600" fill="#5C7A55" text-anchor="middle">oma rütm</text>

  <!-- outer: feine note -->
  <text x="168" y="214" font-size="13" fill="#8B6F84" text-anchor="middle">Rõõm</text>
  <text x="420" y="220" font-size="13" fill="#8B6F84" text-anchor="middle">Eneseväljendus</text>
  <text x="120" y="372" font-size="13" fill="#8B6F84" text-anchor="middle">Ajastus</text>
  <text x="290" y="572" font-size="13" fill="#8B6F84" text-anchor="middle">Määra piirid</text>

  <!-- legend -->
  <text x="560" y="150" font-size="16" font-weight="700" fill="#3E2C39">Kui sügavale ankurdatud?</text>
  <circle cx="572" cy="190" r="9" fill="#C2A14D"/>
  <text x="592" y="187" font-size="14" font-weight="700" fill="#3E2C39">Ankurdatud</text>
  <text x="592" y="207" font-size="12" fill="#5E4257">Palju sõltumatuid vaatenurki</text>
  <text x="592" y="224" font-size="12" fill="#5E4257">kinnita seda – kirjeldab sind usaldusväärselt.</text>

  <circle cx="572" cy="262" r="9" fill="#97AD8E"/>
  <text x="592" y="259" font-size="14" font-weight="700" fill="#3E2C39">Kandmine</text>
  <text x="592" y="279" font-size="12" fill="#5E4257">Seda toetavad mitmed vaatenurgad.</text>

  <circle cx="572" cy="316" r="9" fill="#C2AEBC"/>
  <text x="592" y="313" font-size="14" font-weight="700" fill="#3E2C39">Peen puudutus</text>
  <text x="592" y="333" font-size="12" fill="#5E4257">Üks hääl — pigem</text>
  <text x="592" y="350" font-size="12" fill="#5E4257">Nüanss või situatsiooniline.</text>

  <rect x="560" y="392" width="262" height="150" rx="12" fill="#FFFFFF" stroke="#E4D9CB"/>
  <text x="578" y="420" font-size="13" font-weight="700" fill="#6B4A5E">Miks see aitab</text>
  <text x="578" y="444" font-size="12.5" fill="#5E4257">Sa ei pea andma igale tulemusele sama</text>
  <text x="578" y="462" font-size="12.5" fill="#5E4257">anna palju kaalu. Mis kesklinnas</text>
  <text x="578" y="480" font-size="12.5" fill="#5E4257">valetab, kannab sind; peened noodid peal</text>
  <text x="578" y="498" font-size="12.5" fill="#5E4257">Servad on värvipritsmed, mitte veerud.</text>
  <text x="578" y="524" font-size="11.5" font-style="italic" fill="#8A6B7C">See on täpselt see, mida pere</text>
  <text x="578" y="540" font-size="11.5" font-style="italic" fill="#8A6B7C">Konvergents taustal.</text>

  <text x="40" y="624" font-size="10.5" fill="#A38FA0" font-style="italic">Näidisprofiil, skemaatiline · "Ankurdamine" = teemat toetavate sõltumatute perede arv · Astrakey</text>
</svg>
