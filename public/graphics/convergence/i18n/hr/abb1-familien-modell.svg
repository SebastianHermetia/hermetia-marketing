<svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="600" rx="18" fill="#FBF7F0"/>
  <text x="40" y="46" font-size="23" font-weight="700" fill="#3E2C39">Obiteljski model — konvergencija između neovisnih izvora</text>
  <text x="40" y="72" font-size="14" fill="#6B4A5E">32 sustava → 8 obitelji. Konvergencija računa obitelji, a ne pojedinačne sustave. Broj na desnoj strani = težina obitelji.</text>

  <!-- card template via groups -->
