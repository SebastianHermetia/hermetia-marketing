  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Perussääntö: 5 järjestelmää samasta perheestä, jotka kuvastavat samaa teemamäärää <tspan font-weight="700">ei</tspan> kuin 5 riippumatonta todistetta -</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">todellinen lähentyminen tapahtuu vain silloin, kun <tspan font-weight="700" fill="#3E2C39">useita eri perheitä</tspan> viittaa samaan aiheeseen.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Convergence Engine · Kuva 1 – Perhemäärittely on versioitu konfiguraatio (oikoluettava)</text>
