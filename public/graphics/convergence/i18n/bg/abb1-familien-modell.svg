<svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="600" rx="18" fill="#FBF7F0"/>
  <text x="40" y="46" font-size="23" font-weight="700" fill="#3E2C39">Семеен модел — конвергенция между независими източници</text>
  <text x="40" y="72" font-size="14" fill="#6B4A5E">32 системи → 8 семейства. Конвергенцията отчита семействата, а не отделните системи. Числото вдясно = семейно тегло.</text>

  <!-- card template via groups -->
  <!-- Row 1 -->
  <!-- self_report (highlight) -->
  <g>
    <rect x="40" y="92" width="390" height="104" rx="12" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
    <rect x="40" y="92" width="8" height="104" rx="4" fill="#C2A14D"/>
    <text x="62" y="118" font-size="16" font-weight="700" fill="#3E2C39">self_report ★</text>
    <circle cx="406" cy="112" r="16" fill="#C2A14D"/><text x="406" y="117" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1.3</text>
    <text x="62" y="137" font-size="11.5" font-style="italic" fill="#8A6B7C">Източник: въпросник — най-независимите доказателства</text>
    <text x="62" y="158" font-size="10.5" fill="#5E4257">енеаграма · шестнадесет_типа · спираловидна_динамика · чрез_силни страни · tcm</text>
    <text x="62" y="174" font-size="10.5" fill="#5E4257">big_five · riasec · ayurveda_dosha · хронотип · стил_привързаност</text>
  </g>
  <!-- astro_western -->
  <g>
