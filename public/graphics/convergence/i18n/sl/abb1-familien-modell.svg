  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Osnovno pravilo: šteje 5 sistemov iz iste družine, ki odražajo isto temo <tspan font-weight="700">ne</tspan> kot 5 neodvisnih dokazov —</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">Prava konvergenca se zgodi le, ko <tspan font-weight="700" fill="#3E2C39">več različnih družin</tspan> kažejo na isto temo.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Konvergenčni mehanizem · Slika 1 — Dodelitev družine je konfiguracija z različicami (treba lektorirati)</text>
</svg>
