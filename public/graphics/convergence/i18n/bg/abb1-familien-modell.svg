    <rect x="450" y="92" width="8" height="104" rx="4" fill="#6B4A5E"/>
    <text x="472" y="118" font-size="16" font-weight="700" fill="#3E2C39">astro_western</text>
    <circle cx="816" cy="112" r="16" fill="#6B4A5E"/><text x="816" y="117" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1.0</text>
    <text x="472" y="137" font-size="11.5" font-style="italic" fill="#8A6B7C">Източник: тропически ефемериди</text>
    <text x="472" y="160" font-size="10.5" fill="#5E4257">астрология · sabian_символи · неподвижни_звезди</text>
    <text x="472" y="176" font-size="10.5" fill="#5E4257">астрокартография · драконова_диаграма</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="40" y="208" width="390" height="92" rx="12" fill="#FFFFFF" stroke="#E4D9CB" stroke-width="1.5"/>
    <rect x="40" y="208" width="8" height="92" rx="4" fill="#6E8867"/>
