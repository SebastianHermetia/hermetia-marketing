name: Hermetia marketing CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:i18n:cached

      - name: Check assets
        run: npm run check:assets

      - name: Check content
        run: npm run check:content

      - name: Check launch compliance
        run: npm run check:compliance

      - name: Check i18n export scope
        run: npm run check:i18n:export
