<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="560" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Ce te poartă înăuntru</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Două teme trec prin aproape toate perspectivele despre tine - firul tău comun.</text>

  <!-- Core card 1 -->
  <rect x="40" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="64" y="140" font-size="13" font-weight="700" fill="#B0892F">★ TEMA DE CENTRE</text>
  <text x="64" y="172" font-size="22" font-weight="700" fill="#3E2C39">Permite conectarea</text>
  <text x="64" y="202" font-size="13.5" fill="#5E4257">Apropierea, compasiunea și adevărata unitate sunt</text>
  <text x="64" y="221" font-size="13.5" fill="#5E4257">solul în care crești.</text>
  <text x="64" y="256" font-size="12" fill="#8A6B7C">susținut de 5 din 8 perspective de viață</text>
  <g>
    <circle cx="70" cy="276" r="7" fill="#C2A14D"/><circle cx="92" cy="276" r="7" fill="#C2A14D"/><circle cx="114" cy="276" r="7" fill="#C2A14D"/><circle cx="136" cy="276" r="7" fill="#C2A14D"/><circle cx="158" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="180" cy="276" r="7" fill="#E7DCC8"/><circle cx="202" cy="276" r="7" fill="#E7DCC8"/><circle cx="224" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- Core card 2 -->
  <rect x="460" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="484" y="140" font-size="13" font-weight="700" fill="#B0892F">★ TEMA DE CENTRE</text>
  <text x="484" y="172" font-size="22" font-weight="700" fill="#3E2C39">Permite tăcere și profunzime</text>
  <text x="484" y="202" font-size="13.5" fill="#5E4257">Ai nevoie de retragere și adâncime pentru a</text>
  <text x="484" y="221" font-size="13.5" fill="#5E4257">Să te găsesc - asta este putere, nu lipsă.</text>
  <text x="484" y="256" font-size="12" fill="#8A6B7C">susținut de 4 din 8 perspective de viață</text>
  <g>
    <circle cx="490" cy="276" r="7" fill="#C2A14D"/><circle cx="512" cy="276" r="7" fill="#C2A14D"/><circle cx="534" cy="276" r="7" fill="#C2A14D"/><circle cx="556" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="578" cy="276" r="7" fill="#E7DCC8"/><circle cx="600" cy="276" r="7" fill="#E7DCC8"/><circle cx="622" cy="276" r="7" fill="#E7DCC8"/><circle cx="644" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- supporting themes -->
  <text x="40" y="344" font-size="14" font-weight="700" fill="#6B4A5E">De asemenea, rezonează cu tine</text>
  <text x="40" y="366" font-size="12" fill="#9A8AA0">— mai situațional, mai silențios decât nucleul tău:</text>
  <g font-size="13" fill="#5E4257">
    <rect x="40" y="384" width="200" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="60" y="409">Curaj să fii vizibil</text>
    <rect x="256" y="384" width="190" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="276" y="409">Lasă controlul</text>
    <rect x="462" y="384" width="220" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="482" y="409">Rămâneți în propriul ritm</text>
    <rect x="40" y="434" width="150" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="60" y="459" fill="#9A8AA0">Bucuria...</text>
    <rect x="206" y="434" width="175" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="226" y="459" fill="#9A8AA0">Aveți încredere în sincronizare</text>
    <rect x="397" y="434" width="140" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="417" y="459" fill="#9A8AA0">Stabiliți limite</text>
  </g>

  <text x="40" y="512" font-size="12.5" fill="#6B4A5E">Cu cât perspectivele mai independente asupra unui subiect, cu atât te descrie mai fiabil -</text>
  <text x="40" y="531" font-size="12.5" fill="#6B4A5E">temele tale de bază nu sunt un accident al unei singure metode.</text>
  <text x="40" y="552" font-size="10.5" fill="#A38FA0" font-style="italic">Exemplu de profil, schematic · Astrakey</text>
</svg>
