    <rect x="40" y="416" width="8" height="92" rx="4" fill="#B59FA8"/>
    <text x="62" y="442" font-size="16" font-weight="700" fill="#3E2C39">оракул</text>
    <circle cx="406" cy="436" r="16" fill="#B59FA8"/><text x="406" y="441" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">0.5</text>
    <text x="62" y="461" font-size="11.5" font-style="italic" fill="#8A6B7C">Източник: детерминистично семе</text>
    <text x="62" y="485" font-size="10.5" fill="#5E4257">iching · oracle_cards</text>
  </g>
  <g>
    <rect x="450" y="416" width="390" height="92" rx="12" fill="#FFFFFF" stroke="#E4D9CB" stroke-width="1.5"/>
    <rect x="450" y="416" width="8" height="92" rx="4" fill="#AEBFA6"/>
    <text x="472" y="442" font-size="16" font-weight="700" fill="#3E2C39">цикъл</text>
    <circle cx="816" cy="436" r="16" fill="#9DB094"/><text x="816" y="441" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">0.5</text>
    <text x="472" y="461" font-size="11.5" font-style="italic" fill="#8A6B7C">Източник: чист цикъл от дати</text>
    <text x="472" y="485" font-size="10.5" fill="#5E4257">биоритъм</text>
  </g>

  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Основно правило: Броят се 5 системи от едно и също семейство, които отразяват една и съща тема <tspan font-weight="700">не</tspan> като 5 независими доказателства -</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">истинска конвергенция възниква само когато <tspan font-weight="700" fill="#3E2C39">няколко различни семейства</tspan> сочат към същата тема.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Convergence Engine · Фигура 1 — Присвояването на семейството е конфигурация с версии (за корекция)</text>
</svg>
