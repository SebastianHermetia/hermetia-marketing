<svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="600" rx="18" fill="#FBF7F0"/>
  <text x="40" y="46" font-size="23" font-weight="700" fill="#3E2C39">Družinski model — konvergenca med neodvisnimi viri</text>
  <text x="40" y="72" font-size="14" fill="#6B4A5E">32 sistemov → 8 družin. Konvergenca šteje družine, ne posameznih sistemov. Številka na desni = teža družine.</text>

  <!-- card template via groups -->
  <!-- Row 1 -->
  <!-- self_report (highlight) -->
  <g>
