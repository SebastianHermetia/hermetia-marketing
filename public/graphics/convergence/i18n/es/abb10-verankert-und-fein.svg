<svg viewBox="0 0 860 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="860" height="650" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Lo que está firmemente anclado y qué toque tan fino</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Cuanto más interiormente está un tema, más lo confirman las perspectivas independientes.</text>

  <!-- rings -->
  <circle cx="290" cy="362" r="242" fill="#EFE6EC" stroke="#DCC9D5"/>
  <circle cx="290" cy="362" r="162" fill="#EAF0E6" stroke="#CFDDC6"/>
  <circle cx="290" cy="362" r="82" fill="#F6EBCF" stroke="#E6D29C"/>

  <!-- inner: verankert -->
  <text x="290" y="356" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Conectividad</text>
  <text x="290" y="382" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Silencio y profundidad</text>

  <!-- middle: tragend -->
  <text x="290" y="248" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Coraje para ser visible</text>
  <text x="196" y="430" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Deja ir el control</text>
  <text x="392" y="430" font-size="13" font-weight="600" fill="#5C7A55" text-anchor="middle">propio ritmo</text>

  <!-- outer: feine note -->
  <text x="168" y="214" font-size="13" fill="#8B6F84" text-anchor="middle">la alegria</text>
  <text x="420" y="220" font-size="13" fill="#8B6F84" text-anchor="middle">Autoexpresión</text>
  <text x="120" y="372" font-size="13" fill="#8B6F84" text-anchor="middle">Sincronización</text>
  <text x="290" y="572" font-size="13" fill="#8B6F84" text-anchor="middle">Establecer límites</text>

  <!-- legend -->
  <text x="560" y="150" font-size="16" font-weight="700" fill="#3E2C39">¿Qué tan profundamente anclado?</text>
  <circle cx="572" cy="190" r="9" fill="#C2A14D"/>
  <text x="592" y="187" font-size="14" font-weight="700" fill="#3E2C39">Anclado</text>
  <text x="592" y="207" font-size="12" fill="#5E4257">Muchos puntos de vista independientes.</text>
  <text x="592" y="224" font-size="12" fill="#5E4257">Confírmalo: te describe de forma fiable.</text>

  <circle cx="572" cy="262" r="9" fill="#97AD8E"/>
  <text x="592" y="259" font-size="14" font-weight="700" fill="#3E2C39">llevando</text>
  <text x="592" y="279" font-size="12" fill="#5E4257">Varias perspectivas lo respaldan.</text>

  <circle cx="572" cy="316" r="9" fill="#C2AEBC"/>
  <text x="592" y="313" font-size="14" font-weight="700" fill="#3E2C39">toque fino</text>
  <text x="592" y="333" font-size="12" fill="#5E4257">Una sola voz, más bien</text>
  <text x="592" y="350" font-size="12" fill="#5E4257">Matiz o situacional.</text>

  <rect x="560" y="392" width="262" height="150" rx="12" fill="#FFFFFF" stroke="#E4D9CB"/>
  <text x="578" y="420" font-size="13" font-weight="700" fill="#6B4A5E">¿Por qué esto ayuda?</text>
  <text x="578" y="444" font-size="12.5" fill="#5E4257">No tienes que dar todos los resultados iguales.</text>
  <text x="578" y="462" font-size="12.5" fill="#5E4257">dar mucho peso. que en el centro</text>
  <text x="578" y="480" font-size="12.5" fill="#5E4257">miente, te lleva; las finas notas sobre</text>
  <text x="578" y="498" font-size="12.5" fill="#5E4257">Los bordes son toques de color, no columnas.</text>
  <text x="578" y="524" font-size="11.5" font-style="italic" fill="#8A6B7C">Esto es exactamente lo que la familia</text>
  <text x="578" y="540" font-size="11.5" font-style="italic" fill="#8A6B7C">Convergencia en el fondo.</text>

  <text x="40" y="624" font-size="10.5" fill="#A38FA0" font-style="italic">Perfil de ejemplo, esquemático · “Anclaje” = número de familias independientes que apoyan el tema · Astrakey</text>
</svg>
