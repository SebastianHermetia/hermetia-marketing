  <text x="40" y="540" font-size="12.5" fill="#6B4A5E">Põhireegel: 5 süsteemi ühest perekonnast, mis kajastavad sama teemat <tspan font-weight="700">mitte</tspan> nagu 5 sõltumatut tõendit -</text>
  <text x="40" y="560" font-size="12.5" fill="#6B4A5E">tõeline lähenemine toimub ainult siis, kui <tspan font-weight="700" fill="#3E2C39">mitu erinevat perekonda</tspan> viita samale teemale.</text>
  <text x="40" y="586" font-size="11" fill="#A38FA0">Astrakey · Konvergentsimootor · Joonis 1 – Perekonna määramine on versioonistatud konfiguratsioon (korrektuuri tuleb lugeda)</text>
