<svg viewBox="0 0 860 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="860" height="650" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Wat stevig verankerd is - en wat een fijne aanraking</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Hoe verder een onderwerp zich naar binnen richt, hoe meer onafhankelijke perspectieven het bevestigen.</text>

  <!-- rings -->
  <circle cx="290" cy="362" r="242" fill="#EFE6EC" stroke="#DCC9D5"/>
  <circle cx="290" cy="362" r="162" fill="#EAF0E6" stroke="#CFDDC6"/>
  <circle cx="290" cy="362" r="82" fill="#F6EBCF" stroke="#E6D29C"/>

  <!-- inner: verankert -->
  <text x="290" y="356" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Verbondenheid</text>
  <text x="290" y="382" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Stilte &amp; diepte</text>

  <!-- middle: tragend -->
  <text x="290" y="248" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Moed om zichtbaar te zijn</text>
  <text x="196" y="430" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Laat de controle los</text>
  <text x="392" y="430" font-size="13" font-weight="600" fill="#5C7A55" text-anchor="middle">eigen ritme</text>

  <!-- outer: feine note -->
  <text x="168" y="214" font-size="13" fill="#8B6F84" text-anchor="middle">De vreugde</text>
  <text x="420" y="220" font-size="13" fill="#8B6F84" text-anchor="middle">Zelfexpressie</text>
  <text x="120" y="372" font-size="13" fill="#8B6F84" text-anchor="middle">Tijdstip</text>
  <text x="290" y="572" font-size="13" fill="#8B6F84" text-anchor="middle">Stel grenzen</text>

  <!-- legend -->
  <text x="560" y="150" font-size="16" font-weight="700" fill="#3E2C39">Hoe diep verankerd?</text>
  <circle cx="572" cy="190" r="9" fill="#C2A14D"/>
  <text x="592" y="187" font-size="14" font-weight="700" fill="#3E2C39">Verankerd</text>
  <text x="592" y="207" font-size="12" fill="#5E4257">Veel onafhankelijke standpunten</text>
  <text x="592" y="224" font-size="12" fill="#5E4257">bevestig het - beschrijft u betrouwbaar.</text>

  <circle cx="572" cy="262" r="9" fill="#97AD8E"/>
  <text x="592" y="259" font-size="14" font-weight="700" fill="#3E2C39">Dragen</text>
  <text x="592" y="279" font-size="12" fill="#5E4257">Verschillende perspectieven ondersteunen dit.</text>

  <circle cx="572" cy="316" r="9" fill="#C2AEBC"/>
  <text x="592" y="313" font-size="14" font-weight="700" fill="#3E2C39">Fijne aanraking</text>
  <text x="592" y="333" font-size="12" fill="#5E4257">Eén enkele stem – liever gezegd</text>
  <text x="592" y="350" font-size="12" fill="#5E4257">Nuance of situationeel.</text>

  <rect x="560" y="392" width="262" height="150" rx="12" fill="#FFFFFF" stroke="#E4D9CB"/>
  <text x="578" y="420" font-size="13" font-weight="700" fill="#6B4A5E">Waarom dit helpt</text>
  <text x="578" y="444" font-size="12.5" fill="#5E4257">Je hoeft niet elk resultaat hetzelfde te geven</text>
  <text x="578" y="462" font-size="12.5" fill="#5E4257">veel gewicht geven. Wat in het centrum</text>
  <text x="578" y="480" font-size="12.5" fill="#5E4257">liegt, draagt je; de fijne aantekeningen op</text>
  <text x="578" y="498" font-size="12.5" fill="#5E4257">Randen zijn kleuraccenten, geen kolommen.</text>
  <text x="578" y="524" font-size="11.5" font-style="italic" fill="#8A6B7C">Dit is precies wat de familie doet</text>
  <text x="578" y="540" font-size="11.5" font-style="italic" fill="#8A6B7C">Convergentie op de achtergrond.</text>

  <text x="40" y="624" font-size="10.5" fill="#A38FA0" font-style="italic">Voorbeeldprofiel, schematisch · “Verankering” = aantal onafhankelijke families die het onderwerp ondersteunen · Astrakey</text>
</svg>
