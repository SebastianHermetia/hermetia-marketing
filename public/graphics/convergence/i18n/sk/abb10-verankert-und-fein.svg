<svg viewBox="0 0 860 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="860" height="650" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Čo je pevne ukotvené – a aký jemný dotyk</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Čím je téma hlbšie, tým nezávislejšie perspektívy ju potvrdzujú.</text>

  <!-- rings -->
  <circle cx="290" cy="362" r="242" fill="#EFE6EC" stroke="#DCC9D5"/>
  <circle cx="290" cy="362" r="162" fill="#EAF0E6" stroke="#CFDDC6"/>
  <circle cx="290" cy="362" r="82" fill="#F6EBCF" stroke="#E6D29C"/>

  <!-- inner: verankert -->
  <text x="290" y="356" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Prepojenosť</text>
  <text x="290" y="382" font-size="16.5" font-weight="700" fill="#B0892F" text-anchor="middle">Ticho a hĺbka</text>

  <!-- middle: tragend -->
  <text x="290" y="248" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Odvaha byť viditeľný</text>
  <text x="196" y="430" font-size="14" font-weight="600" fill="#5C7A55" text-anchor="middle">Pustite kontrolu</text>
  <text x="392" y="430" font-size="13" font-weight="600" fill="#5C7A55" text-anchor="middle">vlastný rytmus</text>

  <!-- outer: feine note -->
  <text x="168" y="214" font-size="13" fill="#8B6F84" text-anchor="middle">Radosť</text>
  <text x="420" y="220" font-size="13" fill="#8B6F84" text-anchor="middle">Sebavyjadrenie</text>
  <text x="120" y="372" font-size="13" fill="#8B6F84" text-anchor="middle">Načasovanie</text>
  <text x="290" y="572" font-size="13" fill="#8B6F84" text-anchor="middle">Stanovte si hranice</text>

  <!-- legend -->
  <text x="560" y="150" font-size="16" font-weight="700" fill="#3E2C39">Ako hlboko ukotvené?</text>
  <circle cx="572" cy="190" r="9" fill="#C2A14D"/>
  <text x="592" y="187" font-size="14" font-weight="700" fill="#3E2C39">Ukotvené</text>
  <text x="592" y="207" font-size="12" fill="#5E4257">Mnoho nezávislých pohľadov</text>
  <text x="592" y="224" font-size="12" fill="#5E4257">potvrďte to - popisuje vás spoľahlivo.</text>

  <circle cx="572" cy="262" r="9" fill="#97AD8E"/>
  <text x="592" y="259" font-size="14" font-weight="700" fill="#3E2C39">Prenášanie</text>
  <text x="592" y="279" font-size="12" fill="#5E4257">Podporuje to viacero pohľadov.</text>

  <circle cx="572" cy="316" r="9" fill="#C2AEBC"/>
  <text x="592" y="313" font-size="14" font-weight="700" fill="#3E2C39">Jemný dotyk</text>
  <text x="592" y="333" font-size="12" fill="#5E4257">Jediný hlas – skôr</text>
  <text x="592" y="350" font-size="12" fill="#5E4257">Nuance alebo situačné.</text>

  <rect x="560" y="392" width="262" height="150" rx="12" fill="#FFFFFF" stroke="#E4D9CB"/>
  <text x="578" y="420" font-size="13" font-weight="700" fill="#6B4A5E">Prečo to pomáha</text>
  <text x="578" y="444" font-size="12.5" fill="#5E4257">Nemusíte dať každý výsledok rovnaký</text>
  <text x="578" y="462" font-size="12.5" fill="#5E4257">dať veľkú váhu. Čo v strede</text>
  <text x="578" y="480" font-size="12.5" fill="#5E4257">klame, nesie ťa; jemné poznámky na</text>
  <text x="578" y="498" font-size="12.5" fill="#5E4257">Okraje sú farebné škvrny, nie stĺpce.</text>
  <text x="578" y="524" font-size="11.5" font-style="italic" fill="#8A6B7C">To je presne to, čo rodina</text>
  <text x="578" y="540" font-size="11.5" font-style="italic" fill="#8A6B7C">Konvergencia v pozadí.</text>

  <text x="40" y="624" font-size="10.5" fill="#A38FA0" font-style="italic">Príklad profilu, schéma · “Ukotvenie” = počet nezávislých rodín, ktoré podporujú tému · Astrakey</text>
</svg>
