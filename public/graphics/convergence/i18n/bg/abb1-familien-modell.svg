    <circle cx="406" cy="228" r="16" fill="#6E8867"/><text x="406" y="233" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1.0</text>
    <text x="62" y="253" font-size="11.5" font-style="italic" fill="#8A6B7C">Източник: I-Ching Gate Wheel (Ephemeris + Mandala)</text>
    <text x="62" y="277" font-size="10.5" fill="#5E4257">човешки_дизайн · генни_ключове</text>
  </g>
  <g>
    <rect x="450" y="208" width="390" height="92" rx="12" fill="#FFFFFF" stroke="#E4D9CB" stroke-width="1.5"/>
    <rect x="450" y="208" width="8" height="92" rx="4" fill="#8A6B7C"/>
    <text x="472" y="234" font-size="16" font-weight="700" fill="#3E2C39">нумерология</text>
    <circle cx="816" cy="228" r="16" fill="#8A6B7C"/><text x="816" y="233" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">0.8</text>
    <text x="472" y="253" font-size="11.5" font-style="italic" fill="#8A6B7C">Източник: Обща дата на раждане / Име</text>
    <text x="472" y="277" font-size="10.5" fill="#5E4257">нумерология · кабала · kabbalah_ext · таро_раждане · карти_на_съдбата · lo_shu_grid</text>
  </g>

