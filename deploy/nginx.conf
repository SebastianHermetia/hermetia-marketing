server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vorschau-/Testphase: gesamte Seite auf noindex (Origin-seitig, da der
    # Cloudflare-Pages-`_headers`-Mechanismus hinter dem Tunnel nicht greift).
    # Zum echten Launch entfernen.
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Statischer Next-Export mit trailingSlash:true → Verzeichnis-Index-Dateien.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;

    # Lange Caches für gehashte Assets, kurze für HTML.
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
