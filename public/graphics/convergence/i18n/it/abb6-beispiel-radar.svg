<svg viewBox="0 0 820 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="820" height="600" rx="18" fill="#FBF7F0"/>
  <text x="40" y="44" font-size="23" font-weight="700" fill="#3E2C39">Profilo di esempio: i 9 macro temi</text>
  <text x="40" y="68" font-size="14" fill="#6B4A5E">Questo è l'aspetto di un ConvergenceProfile (valori schematici, non reali).</text>

  <!-- grid -->
  <polygon points="410,150 525.7,192.1 587.3,298.7 565.9,420 471.6,499.2 348.4,499.2 254.1,420 232.7,298.7 294.3,192.1" fill="#FFFFFF" stroke="#D8CcBd" stroke-width="1.5"/>
  <polygon points="410,240 467.9,261.1 498.7,314.3 487.9,375 440.8,414.6 379.2,414.6 332.1,375 321.3,314.3 352.1,261.1" fill="none" stroke="#E4D9CB" stroke-width="1"/>
  <g stroke="#E4D9CB" stroke-width="1">
    <line x1="410" y1="330" x2="410" y2="150"/><line x1="410" y1="330" x2="525.7" y2="192.1"/>
    <line x1="410" y1="330" x2="587.3" y2="298.7"/><line x1="410" y1="330" x2="565.9" y2="420"/>
    <line x1="410" y1="330" x2="471.6" y2="499.2"/><line x1="410" y1="330" x2="348.4" y2="499.2"/>
    <line x1="410" y1="330" x2="254.1" y2="420"/><line x1="410" y1="330" x2="232.7" y2="298.7"/>
    <line x1="410" y1="330" x2="294.3" y2="192.1"/>
  </g>

  <!-- data polygon -->
  <polygon points="410,231 456,275 516,311 465,362 469,491 392,381 332,375 286,308 312,213" fill="#C2A14D" fill-opacity="0.22" stroke="#C2A14D" stroke-width="2.5"/>
  <g fill="#B0892F">
    <circle cx="410" cy="231" r="3.5"/><circle cx="456" cy="275" r="3.5"/><circle cx="516" cy="311" r="3.5"/>
    <circle cx="465" cy="362" r="3.5"/><circle cx="392" cy="381" r="3.5"/><circle cx="332" cy="375" r="3.5"/>
  </g>
  <!-- core theme vertices highlighted -->
  <circle cx="469" cy="491" r="6.5" fill="#C2A14D" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="312" cy="213" r="6.5" fill="#C2A14D" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="286" cy="308" r="5" fill="#8B6F84"/>

  <!-- axis labels -->
  <g font-size="11.5" fill="#5E4257" text-anchor="middle">
    <text x="410" y="120">espressione di sé<tspan font-size="9.5" fill="#9A8AA0"> 0.55</tspan></text>
    <text x="548" y="170">gioia<tspan font-size="9.5" fill="#9A8AA0"> 0.40</tspan></text>
    <text x="618" y="294">controllo<tspan font-size="9.5" fill="#9A8AA0"> 0.60</tspan></text>
    <text x="590" y="436">tempistica<tspan font-size="9.5" fill="#9A8AA0"> 0.35</tspan></text>
    <text x="480" y="525" font-weight="700" fill="#B0892F">★ connessione 0,95</text>
    <text x="338" y="525">confini<tspan font-size="9.5" fill="#9A8AA0"> 0.30</tspan></text>
    <text x="228" y="436">ritmo<tspan font-size="9.5" fill="#9A8AA0"> 0.50</tspan></text>
    <text x="205" y="294" fill="#8B6F84">visibilità<tspan font-size="9.5"> 0.70</tspan></text>
    <text x="270" y="168" font-weight="700" fill="#B0892F">★ silenzioso 0,85</text>
  </g>

  <!-- legend -->
  <rect x="620" y="430" width="170" height="118" rx="10" fill="#FFFFFF" stroke="#E4D9CB"/>
  <circle cx="638" cy="456" r="6.5" fill="#C2A14D"/><text x="652" y="460" font-size="11.5" fill="#3E2C39">core_themes (primi 2)</text>
  <text x="652" y="475" font-size="10" fill="#9A8AA0">connessione · silenzio</text>
  <text x="632" y="500" font-size="13" fill="#8B6F84">⚖</text><text x="652" y="500" font-size="11.5" fill="#3E2C39">Campo di tensione</text>
  <text x="652" y="515" font-size="10" fill="#9A8AA0">visibilità ↔ silenzio</text>
  <text x="632" y="538" font-size="10" fill="#9A8AA0">(entrambi forti = √(a b) alto)</text>

  <text x="40" y="578" font-size="11" fill="#A38FA0">Astrakey · Convergence Engine · Fig. 6 — Strength_rel per macro argomento; ★ = temi centrali, ⚖ = aree di tensione identificate.</text>
</svg>
