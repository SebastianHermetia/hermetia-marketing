<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="560" rx="18" fill="#FBF7F0"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#3E2C39">Какво те носи вътре</text>
  <text x="40" y="76" font-size="14.5" fill="#6B4A5E">Две теми преминават през почти всички гледни точки към вас - вашата обща нишка.</text>

  <!-- Core card 1 -->
  <rect x="40" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="64" y="140" font-size="13" font-weight="700" fill="#B0892F">★ ОСНОВНА ТЕМА</text>
  <text x="64" y="172" font-size="22" font-weight="700" fill="#3E2C39">Разрешете връзка</text>
  <text x="64" y="202" font-size="13.5" fill="#5E4257">Близостта, състраданието и истинската заедност са</text>
  <text x="64" y="221" font-size="13.5" fill="#5E4257">почвата, в която растете.</text>
  <text x="64" y="256" font-size="12" fill="#8A6B7C">подкрепени от 5 от 8 житейски перспективи</text>
  <g>
    <circle cx="70" cy="276" r="7" fill="#C2A14D"/><circle cx="92" cy="276" r="7" fill="#C2A14D"/><circle cx="114" cy="276" r="7" fill="#C2A14D"/><circle cx="136" cy="276" r="7" fill="#C2A14D"/><circle cx="158" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="180" cy="276" r="7" fill="#E7DCC8"/><circle cx="202" cy="276" r="7" fill="#E7DCC8"/><circle cx="224" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- Core card 2 -->
  <rect x="460" y="104" width="400" height="190" rx="16" fill="#FFFFFF" stroke="#C2A14D" stroke-width="2.5"/>
  <text x="484" y="140" font-size="13" font-weight="700" fill="#B0892F">★ ОСНОВНА ТЕМА</text>
  <text x="484" y="172" font-size="22" font-weight="700" fill="#3E2C39">Позволете тишина и дълбочина</text>
  <text x="484" y="202" font-size="13.5" fill="#5E4257">Имате нужда от отстъпление и дълбочина, за да</text>
  <text x="484" y="221" font-size="13.5" fill="#5E4257">Да те намеря - това е сила, а не липса.</text>
  <text x="484" y="256" font-size="12" fill="#8A6B7C">подкрепени от 4 от 8 житейски перспективи</text>
  <g>
    <circle cx="490" cy="276" r="7" fill="#C2A14D"/><circle cx="512" cy="276" r="7" fill="#C2A14D"/><circle cx="534" cy="276" r="7" fill="#C2A14D"/><circle cx="556" cy="276" r="7" fill="#C2A14D"/>
    <circle cx="578" cy="276" r="7" fill="#E7DCC8"/><circle cx="600" cy="276" r="7" fill="#E7DCC8"/><circle cx="622" cy="276" r="7" fill="#E7DCC8"/><circle cx="644" cy="276" r="7" fill="#E7DCC8"/>
  </g>

  <!-- supporting themes -->
  <text x="40" y="344" font-size="14" font-weight="700" fill="#6B4A5E">Това също резонира с вас</text>
  <text x="40" y="366" font-size="12" fill="#9A8AA0">— по-ситуационен, по-тих от вашето ядро:</text>
  <g font-size="13" fill="#5E4257">
    <rect x="40" y="384" width="200" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="60" y="409">Смелост да бъдеш видим</text>
    <rect x="256" y="384" width="190" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="276" y="409">Оставете контрола</text>
    <rect x="462" y="384" width="220" height="40" rx="20" fill="#FFFFFF" stroke="#D8CcBd"/><text x="482" y="409">Останете в собствения си ритъм</text>
    <rect x="40" y="434" width="150" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="60" y="459" fill="#9A8AA0">Радостта...</text>
    <rect x="206" y="434" width="175" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="226" y="459" fill="#9A8AA0">Доверете се на времето</text>
    <rect x="397" y="434" width="140" height="40" rx="20" fill="#FBF7F0" stroke="#E4D9CB"/><text x="417" y="459" fill="#9A8AA0">Поставете граници</text>
  </g>

  <text x="40" y="512" font-size="12.5" fill="#6B4A5E">Колкото по-независими са гледните точки по дадена тема, толкова по-надеждно ви описва тя -</text>
  <text x="40" y="531" font-size="12.5" fill="#6B4A5E">вашите основни теми не са случайност на един метод.</text>
  <text x="40" y="552" font-size="10.5" fill="#A38FA0" font-style="italic">Примерен профил, схематичен · Astrakey</text>
</svg>
